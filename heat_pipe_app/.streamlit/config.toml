[theme]
# Light theme. Body text dark for contrast; variables are rendered in Times
# New Roman via inline spans (see app_utils.SYM), while the general UI font
# stays the clean default sans for readability.
base = "light"
primaryColor = "#1f5fb0"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f4f9"
textColor = "#1a2230"
font = "sans serif"

[server]
headless = true
